<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Chatbot — NavGurukul Hackathon</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f5f6fa; color: #1a1a2e; height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a1a2e; color: #fff; padding: 14px 24px;
           display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
  header h1 { font-size: 17px; font-weight: 600; }
  header span { font-size: 12px; color: #94a3b8; margin-left: auto; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .status-dot.red { background: #ef4444; }

  .container { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 280px; background: #fff; border-right: 1px solid #e2e8f0;
             display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto; }
  .sidebar h2 { font-size: 12px; font-weight: 600; text-transform: uppercase;
                letter-spacing: .05em; color: #64748b; margin-bottom: 4px; }
  .ingest-btn { background: #2563eb; color: #fff; border: none; border-radius: 8px;
                padding: 10px; font-size: 13px; font-weight: 500; cursor: pointer; width: 100%; }
  .ingest-btn:hover { background: #1d4ed8; }
  .ingest-btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; }
  .stat-card .label { font-size: 11px; color: #64748b; }
  .stat-card .value { font-size: 20px; font-weight: 600; color: #1a1a2e; }
  .sources-panel { flex: 1; overflow-y: auto; }
  .source-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
                 padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
  .source-item .filename { font-weight: 600; color: #2563eb; word-break: break-all; }
  .source-item .page { color: #64748b; }
  .source-item .preview { color: #475569; margin-top: 4px; line-height: 1.4;
                           display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .score-badge { display: inline-block; background: #dbeafe; color: #1e40af;
                 font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .msg.user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: #fff; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; white-space: pre-wrap; }
  .msg-meta { font-size: 11px; color: #94a3b8; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: bounce .9s infinite; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .input-bar { padding: 14px 20px; background: #fff; border-top: 1px solid #e2e8f0;
               display: flex; gap: 10px; align-items: flex-end; }
  .input-bar textarea { flex: 1; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px;
                        font-size: 14px; resize: none; font-family: inherit; outline: none;
                        max-height: 120px; line-height: 1.5; }
  .input-bar textarea:focus { border-color: #2563eb; }
  .send-btn { background: #2563eb; color: #fff; border: none; border-radius: 10px;
              width: 42px; height: 42px; cursor: pointer; font-size: 18px; flex-shrink: 0; }
  .send-btn:hover { background: #1d4ed8; }
  .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }

  .empty-state { text-align: center; color: #94a3b8; margin: auto; }
  .empty-state h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }
</style>
</head>
<body>
<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>RAG Chatbot</h1>
  <span id="statusText">Checking status...</span>
</header>

<div class="container">
  <div class="sidebar">
    <div>
      <h2>Corpus</h2>
      <div class="stat-card" style="margin-bottom:8px">
        <div class="label">Chunks Indexed</div>
        <div class="value" id="chunkCount">—</div>
      </div>
      <button class="ingest-btn" id="ingestBtn" onclick="runIngest()">⚡ Ingest PDFs from /data/pdfs</button>
      <div id="ingestStatus" style="font-size:12px;color:#64748b;margin-top:6px;text-align:center"></div>
    </div>
    <div class="sources-panel">
      <h2 style="margin-bottom:8px">Last Retrieved Chunks</h2>
      <div id="sourcesList"><p style="font-size:12px;color:#94a3b8">Ask a question to see sources.</p></div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state">
        <h3>RAG Chatbot Ready</h3>
        <p>Ingest your PDFs, then ask any question.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="inputBox" rows="1" placeholder="Ask a question about your documents..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendQuery()">↑</button>
    </div>
  </div>
</div>

<script>
const API = '';

async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = `${d.chunks_indexed.toLocaleString()} chunks indexed`;
    document.getElementById('chunkCount').textContent = d.chunks_indexed.toLocaleString();
  } catch {
    document.getElementById('statusDot').className = 'status-dot red';
    document.getElementById('statusText').textContent = 'API offline';
  }
}

async function runIngest() {
  const btn = document.getElementById('ingestBtn');
  const status = document.getElementById('ingestStatus');
  btn.disabled = true;
  btn.textContent = '⏳ Ingesting...';
  status.textContent = 'This may take a few minutes for large PDFs...';
  try {
    const r = await fetch(`${API}/ingest`, { method: 'POST' });
    const d = await r.json();
    status.textContent = `✓ ${d.pdfs_processed} PDFs, ${d.chunks_stored} chunks in ${d.duration_seconds}s`;
    btn.textContent = '✓ Ingestion complete';
    checkHealth();
  } catch(e) {
    status.textContent = '✗ Ingestion failed: ' + e.message;
    btn.disabled = false;
    btn.textContent = '⚡ Retry Ingest';
  }
}

function addMessage(role, text, meta) {
  const container = document.getElementById('messages');
  const empty = container.querySelector('.empty-state');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="bubble">${escapeHtml(text)}</div>
    ${meta ? `<div class="msg-meta">${meta}</div>` : ''}
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function renderSources(chunks) {
  const list = document.getElementById('sourcesList');
  if (!chunks || !chunks.length) {
    list.innerHTML = '<p style="font-size:12px;color:#94a3b8">No sources found.</p>';
    return;
  }
  list.innerHTML = chunks.map(c => `
    <div class="source-item">
      <div class="filename">${escapeHtml(c.filename)} <span class="score-badge">${c.score}</span></div>
      <div class="page">Page ${c.page}</div>
      <div class="preview">${escapeHtml(c.text_preview)}</div>
    </div>
  `).join('');
}

async function sendQuery() {
  const box = document.getElementById('inputBox');
  const question = box.value.trim();
  if (!question) return;

  box.value = '';
  autoResize(box);
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', question);
  showTyping();

  try {
    const r = await fetch(`${API}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, top_k: 5 }),
    });
    const d = await r.json();
    removeTyping();

    if (!r.ok) throw new Error(d.detail || 'Query failed');

    addMessage('bot', d.answer, `${d.latency_ms}ms · ${d.sources.length} source(s)`);
    renderSources(d.retrieved_chunks);
  } catch(e) {
    removeTyping();
    addMessage('bot', `Error: ${e.message}`);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    box.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
